services:
  - type: web
    name: plate-me-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: plate-me-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SQLITE_PATH
        value: /var/data/plate_me.db
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: plate-me
    runtime: static
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: REACT_APP_BACKEND_URL
        sync: false
